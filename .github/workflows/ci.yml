name: Python Playwright CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install reportlab

      - name: Install Playwright Chromium
        shell: bash
        run: |
          python -m playwright install --with-deps chromium

      - name: Run UI tests
        uses: ./.github/actions/run-pytest-suite
        with:
          test_path: tests/ui
          report_dir: reports/ui
          run_ui: "true"
          headless: "true"
          slow_mo_ms: "0"
          timeout_ms: "60000"

      - name: Run API tests
        uses: ./.github/actions/run-pytest-suite
        with:
          test_path: tests/api
          report_dir: reports/api
          run_ui: "false"
          timeout_ms: "30000"

      - name: Generate PDF reports
        shell: bash
        run: |
          python scripts/generate_pdf_reports.py \
            --ui-junit reports/ui/junit.xml \
            --api-junit reports/api/junit.xml \
            --out-dir reports/pdf

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/ui
            reports/api
            reports/pdf
